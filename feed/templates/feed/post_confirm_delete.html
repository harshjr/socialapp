{% extends 'feed/base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="form-page-layout">
  <div class="form-card danger-card">
    <h2 class="form-title">Delete this post?</h2>
    <div class="post-card" style="margin:1.5rem 0;">
      {% if post.content %}<p class="post-content">{{ post.content }}</p>{% endif %}
      {% if post.image %}<img src="{{ post.image.url }}" style="max-height:200px;border-radius:8px;width:100%;object-fit:cover;">{% endif %}
    </div>
    <p style="color:var(--text-muted);margin-bottom:1.5rem;">This action cannot be undone.</p>
    <form method="POST" class="form-actions">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'post_detail' pk=post.id %}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
